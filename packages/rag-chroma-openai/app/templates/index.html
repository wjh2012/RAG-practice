{% extends "base.html" %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 py-8">
    <!-- Header -->
    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-gray-800">PDF RAG Q&A System</h1>
        <p class="text-gray-500 mt-2">PDF 문서를 업로드하고 질문하세요</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Left: Document Management -->
        <div class="lg:col-span-1 space-y-6">
            {% include "components/upload.html" %}

            <!-- Document List -->
            <div class="bg-white rounded-xl shadow-sm border p-5">
                <h2 class="text-lg font-semibold text-gray-700 mb-3">업로드된 문서</h2>
                <div id="document-list" class="space-y-2">
                    <p class="text-gray-400 text-sm" id="no-docs-msg">문서가 없습니다.</p>
                </div>
            </div>
        </div>

        <!-- Right: Search & Results -->
        <div class="lg:col-span-2 space-y-6">
            {% include "components/search.html" %}
            {% include "components/results.html" %}
        </div>
    </div>
</div>
{% endblock %}
