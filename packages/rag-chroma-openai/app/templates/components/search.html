<!-- Search Component -->
<div class="bg-white rounded-xl shadow-sm border p-5">
    <h2 class="text-lg font-semibold text-gray-700 mb-3">질문하기</h2>
    <form id="search-form" class="flex gap-3">
        <input type="text" id="query-input"
               class="flex-1 border border-gray-300 rounded-lg px-4 py-2.5 text-sm
                      focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
               placeholder="PDF 문서에 대해 질문하세요...">
        <button type="submit" id="search-btn"
                class="bg-blue-500 text-white px-6 py-2.5 rounded-lg text-sm font-medium
                       hover:bg-blue-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            검색
        </button>
    </form>
</div>
