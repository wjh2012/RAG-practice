[project]
name = "graph-rag-neo4j-pkg"
version = "0.1.0"
description = "Graph RAG using neo4j-graphrag official package"
requires-python = ">=3.10"
dependencies = [
    "neo4j-graphrag[openai]>=1.5.0",
    "fastapi>=0.135.1",
    "uvicorn>=0.40.0",
    "jinja2>=3.1.6",
    "aiofiles>=25.1.0",
    "python-multipart>=0.0.22",
    "pydantic-settings>=2.12.0",
    "pymupdf>=1.27.1",
]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
