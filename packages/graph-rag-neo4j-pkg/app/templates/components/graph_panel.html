<div class="bg-white rounded-xl shadow-sm border p-5">
    <div class="flex items-center gap-2 mb-3">
        <h2 class="text-lg font-semibold text-gray-700">지식 그래프 통계</h2>
        <span class="text-xs bg-purple-100 text-purple-600 px-1.5 py-0.5 rounded">neo4j-graphrag</span>

    <div id="graph-stats" class="space-y-3">
