<div class="bg-white rounded-xl shadow-sm border p-5">
    <h2 class="text-lg font-semibold text-gray-700 mb-3">문서 업로드</h2>
    <div id="drop-zone"
         class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer
                hover:border-purple-400 hover:bg-purple-50 transition-colors">
        <svg class="mx-auto h-10 w-10 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
        </svg>
        <p class="text-sm text-gray-500">PDF 파일을 드래그하거나 클릭하여 업로드</p>
        <p class="text-xs text-gray-400 mt-1">SimpleKGPipeline으로 자동 KG 구축</p>
        <input type="file" id="file-input" accept=".pdf" class="hidden">
    </div>
    <div id="upload-progress" class="hidden mt-4">
        <div class="flex items-center gap-3">
            <div class="flex-1 bg-gray-200 rounded-full h-2">
                <div id="progress-bar" class="bg-purple-500 h-2 rounded-full transition-all" style="width: 0%"></div>
            </div>
            <span id="progress-text" class="text-sm text-gray-500">처리 중...</span>
        </div>
    </div>
</div>
