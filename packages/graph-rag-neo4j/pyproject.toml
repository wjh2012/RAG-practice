[project]
name = "graph-rag-neo4j"
version = "0.1.0"
description = "Graph RAG with Neo4j knowledge graph + vector index"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.135.1",
    "uvicorn>=0.40.0",
    "jinja2>=3.1.6",
    "aiofiles>=25.1.0",
    "python-multipart>=0.0.22",
    "pydantic-settings>=2.12.0",
    "neo4j>=5.27.0",
    "openai>=1.60.0",
    "pymupdf>=1.27.1",
    "pdfplumber>=0.11.9",
    "easyocr>=1.7.2",
    "langchain-text-splitters>=1.1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
